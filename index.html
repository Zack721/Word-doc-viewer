<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Document Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; text-align: center; }
        .container { background: #f5f5f5; padding: 40px; border-radius: 8px; }
        button { padding: 12px 24px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
        .view-btn { background: #0366d6; color: white; }
        .download-btn { background: #28a745; color: white; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Word Document Viewer</h1>
        <a href="https://view.officeapps.live.com/op/embed.aspx?src=https://raw.githubusercontent.com/Zack721/word-doc-viewer/main/document.docx" target="_blank">
            <button class="view-btn">👁️ View Document</button>
        </a>
        <a href="document.docx" download>
            <button class="download-btn">⬇️ Download Document</button>
        </a>
    </div>
</body>
</html>
